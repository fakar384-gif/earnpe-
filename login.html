<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EarnPe</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #000; color: #fff; margin: 0; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .auth-container { background: linear-gradient(135deg, #111, #1c1c1c); width: 100%; max-width: 400px; padding: 40px 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0, 255, 204, 0.1); border: 1px solid #333; text-align: center; box-sizing: border-box; }
        
        .logo-text { font-size: 35px; font-weight: 900; color: #00ffcc; letter-spacing: 2px; margin-bottom: 5px; }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 30px; }

        .input-group { position: relative; margin-bottom: 20px; text-align: left; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #00ffcc; font-size: 18px; }
        .input-group input { width: 100%; background: #0a0a0a; border: 1px solid #333; color: #fff; padding: 15px 15px 15px 45px; border-radius: 10px; font-size: 16px; outline: none; transition: 0.3s; box-sizing: border-box; }
        .input-group input:focus { border-color: #00ffcc; box-shadow: 0 0 8px rgba(0, 255, 204, 0.3); }

        .forgot-pass { display: block; text-align: right; color: #888; font-size: 12px; text-decoration: none; margin-bottom: 25px; transition: 0.3s; }
        .forgot-pass:hover { color: #00ffcc; }

        .auth-btn { background: #00ffcc; color: #000; border: none; width: 100%; padding: 15px; font-weight: bold; font-size: 18px; border-radius: 30px; cursor: pointer; transition: 0.3s; }
        .auth-btn:hover { background: #00ccaa; transform: translateY(-2px); }
        .auth-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

        .switch-page { margin-top: 25px; font-size: 14px; color: #888; }
        .switch-page a { color: #00ffcc; text-decoration: none; font-weight: bold; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="auth-container">
    <div class="logo-text">EarnPe</div>
    <div class="subtitle">Welcome back! Please login to continue.</div>

    <form id="loginForm">
        <div class="input-group">
            <i class="fa-solid fa-phone"></i>
            <input type="tel" id="mobile" placeholder="Mobile Number" required>
        </div>
        
        <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" placeholder="Password" required>
        </div>

        <a href="#" class="forgot-pass">Forgot Password?</a>

        <button type="submit" class="auth-btn" id="loginBtn">LOGIN</button>
    </form>

    <div class="switch-page">
        Don't have an account? <a href="signup.html">Sign Up</a>
    </div>
</div>

<script>
    // Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyBOSS89xSmSm3ijgVk5ydyccEh8wSJjn0k",
        authDomain: "earnpe-ca9d8.firebaseapp.com",
        projectId: "earnpe-ca9d8",
        storageBucket: "earnpe-ca9d8.firebasestorage.app",
        messagingSenderId: "305792608968",
        appId: "1:305792608968:web:f91054c2a2b7dac4fc93fd"
    };

    // Firebase Initialize করা
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    document.getElementById("loginForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        
        const btn = document.getElementById("loginBtn");
        const mobile = document.getElementById("mobile").value;
        const password = document.getElementById("password").value;
        
        const email = mobile + "@earnpe.com";
        
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Checking...';
        btn.disabled = true;

        try {
            // লগইন করা
            const userCredential = await auth.signInWithEmailAndPassword(email, password);
            const user = userCredential.user;

            // ডাটাবেস থেকে তথ্য নিয়ে আসা
            const userDoc = await db.collection("users").doc(user.uid).get();
            
            if (userDoc.exists) {
                const userData = userDoc.data();
                localStorage.setItem("userName", userData.name || "User");
                localStorage.setItem("mainBalance", userData.balance || "0.00");
                localStorage.setItem("confirmLeads", userData.confirmLeads || "0");
                localStorage.setItem("pendingLeads", userData.pendingLeads || "0");
                localStorage.setItem("isLoggedIn", "true");
                
                window.location.replace("index.html");
            } else {
                alert("User profile not found!");
                btn.disabled = false;
                btn.innerText = "LOGIN";
            }
        } catch (error) {
            alert("Login Failed: " + error.message);
            btn.disabled = false;
            btn.innerText = "LOGIN";
        }
    });
</script>

</body>
</html>
