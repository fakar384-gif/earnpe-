<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment - Tasks</title>
    <link rel="stylesheet" href="demat-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Category Tabs Modern Design */
        .category-tabs { display: flex; gap: 12px; padding: 15px 20px; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid #222; -ms-overflow-style: none; scrollbar-width: none; }
        .category-tabs::-webkit-scrollbar { display: none; }
        .tab-link { text-decoration: none; color: #aaa; font-size: 13px; padding: 8px 18px; border: 1px solid #444; border-radius: 25px; background: transparent; transition: all 0.3s ease; }
        .tab-link:hover { background: #222; color: #fff; border-color: #555; }
        .tab-link.active { background: rgba(0, 255, 204, 0.1); color: #00ffcc; border-color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="page-header">
        <a href="index.html" class="back-btn" style="text-decoration: none;">❮</a>
        <h2>Investment</h2>
    </div>

    <div class="category-tabs">
        <a href="credit-card.html" class="tab-link">Credit Card</a>
        <a href="loan.html" class="tab-link">Loan</a>
        <a href="savings.html" class="tab-link">Savings</a>
        <a href="demat.html" class="tab-link">Demat</a>
        <a href="investment.html" class="tab-link active">Investment</a>
        <a href="crypto.html" class="tab-link">Crypto</a>
        <a href="others.html" class="tab-link">Others</a>
    </div>

    <div class="tasks-list" id="tasks-list">
        <p style="text-align: center; color: #888;">Loading offers...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBOSS89xSmSm3ijgVk5ydyccEh8wSJjn0k",
        authDomain: "earnpe-ca9d8.firebaseapp.com",
        projectId: "earnpe-ca9d8",
        storageBucket: "earnpe-ca9d8.firebasestorage.app",
        messagingSenderId: "305792608968",
        appId: "1:305792608968:web:f91054c2a2b7dac4fc93fd"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadOffers() {
        const tasksList = document.getElementById('tasks-list');
        
        try {
            const q = query(collection(db, "offers"), where("category", "==", "investment"));
            const querySnapshot = await getDocs(q);
            
            tasksList.innerHTML = ""; 
            let activeTaskCount = 0; // এখানে ০ দিয়ে শুরু করা হয়েছে

            querySnapshot.forEach((doc) => {
                const data = doc.data(); 
                
                // === ম্যাজিক ফিল্টার ===
                if(data.status === "active" || !data.status) {
                    activeTaskCount++; 
                    
                    // === লোগো দেখানোর নতুন লজিক যোগ করা হলো ===
                    const logoHtml = (data.logo && data.logo.trim() !== "") 
                        ? `<img src="${data.logo}" alt="Logo" style="width: 100%; height: 100%; object-fit: contain; border-radius: 8px;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3135/3135715.png';">`
                        : `<div style="background-color: #2b2b36; color: #00ffcc; font-weight: bold; font-size: 10px; display:flex; align-items:center; justify-content:center; height:100%; text-align:center; border-radius: 8px;">${data.name.substring(0,3)}</div>`;

                    const cardHTML = `
                    <div class="task-card" onclick="window.location.href='task-detail.html?id=${doc.id}'" style="cursor: pointer;">
                        <div class="ribbon app-ribbon">APP</div>
                        <div class="app-logo" style="width: 50px; height: 50px; flex-shrink: 0; margin-right: 15px; border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; background-color: #2b2b36;">
                            ${logoHtml}
                        </div>
                        <div class="task-info">
                            <h3>${data.name}</h3>
                            <p class="task-desc">${data.description}</p>
                            <p class="offer-status">🕒 Offer is active now!</p>
                            <div class="reward-row">
                                <div class="reward-amount">
                                    <span class="rupee">₹ ${data.amount}</span> + <span class="coin">🪙 ${data.coin}</span>
                                </div>
                                <button class="view-btn">View Detail</button>
                            </div>
                        </div>
                    </div>
                    `;
                    
                    tasksList.innerHTML += cardHTML;
                }
            });

            if(activeTaskCount === 0) {
                tasksList.innerHTML = "<p style='text-align:center; color:#ccc;'>No investment offers found right now.</p>";
            }

        } catch (error) {
            console.error("Error fetching data: ", error);
            tasksList.innerHTML = "<p style='text-align:center; color:red;'>Failed to load offers. Make sure internet is connected.</p>";
        }
    }

    loadOffers();
</script>
<script src="language.js"></script>
</body>
</html>
