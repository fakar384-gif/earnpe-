<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Coins - EarnPe</title>
    <link rel="stylesheet" href="demat-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #000; color: #fff; margin: 0; font-family: Arial, sans-serif; }
        .coins-container { padding: 20px; text-align: center; }
        
        /* Coin Card Design */
        .coin-card {
            background: linear-gradient(135deg, #1c1c1c, #2b2b36);
            border: 1px solid #ffcc00;
            border-radius: 15px;
            padding: 30px 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(255, 204, 0, 0.15);
        }
        .coin-card h3 { margin: 0; color: #888; font-size: 16px; text-transform: uppercase; letter-spacing: 1px;}
        .coin-amount { font-size: 45px; font-weight: bold; color: #ffcc00; margin: 15px 0; }
        .coin-amount i { font-size: 35px; margin-right: 10px; }
        
        .cash-value {
            background: rgba(0, 255, 204, 0.1);
            color: #00ffcc;
            display: inline-block;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            border: 1px solid rgba(0, 255, 204, 0.3);
        }

        /* Conversion Rules Box */
        .convert-box {
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            text-align: left;
        }
        .convert-box h4 { margin-top: 0; color: #fff; border-bottom: 1px solid #333; padding-bottom: 15px; font-size: 16px;}
        .rules-list { font-size: 13px; color: #aaa; line-height: 1.6; padding-left: 20px; margin-bottom: 25px;}
        .rules-list li { margin-bottom: 10px; }
        .rules-list strong { color: #ffcc00; }
        
        /* Progress Bar */
        .progress-container {
            background: #222;
            border-radius: 10px;
            height: 12px;
            width: 100%;
            margin: 10px 0;
            overflow: hidden;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }
        .progress-bar {
            background: linear-gradient(90deg, #ff9900, #ffcc00);
            height: 100%;
            width: 0%;
            transition: width 0.5s ease-in-out;
            border-radius: 10px;
        }
        .progress-text { font-size: 12px; color: #888; display: flex; justify-content: space-between; margin-bottom: 20px;}

        /* Convert Button */
        .convert-btn {
            background: #ffcc00;
            color: #000;
            border: none;
            width: 100%;
            padding: 15px;
            font-weight: bold;
            font-size: 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .convert-btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        
        #msg { margin-top: 15px; font-size: 14px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="page-header">
        <a href="index.html" class="back-btn" style="text-decoration: none;">❮</a>
        <h2>My Coins</h2>
    </div>
    
    <div class="coins-container">
        <div class="coin-card">
            <h3>Total Earned Coins</h3>
            <div class="coin-amount">
                <i class="fa-solid fa-coins"></i> <span id="coinBalance">0</span>
            </div>
            <div class="cash-value">Wallet Value: ₹<span id="cashValue">0.00</span></div>
        </div>

        <div class="convert-box">
            <h4>Convert Coins to Cash</h4>
            <ul class="rules-list">
                <li>You need a minimum of <strong>3000 Coins</strong> to redeem.</li>
                <li>Conversion Rate: <strong>100 Coins = ₹1</strong></li>
                <li>Redeemed cash will be added directly to your main wallet balance.</li>
            </ul>

            <div class="progress-text">
                <span id="currentProgress">0 Coins</span>
                <span>Target: 3000</span>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <button class="convert-btn" id="convertBtn" onclick="convertCoins()">
                <i class="fa-solid fa-money-bill-transfer"></i> CONVERT TO CASH
            </button>
            <div id="msg"></div>
        </div>
    </div>
</div>

<script>
    // --- টেস্টিংয়ের জন্য এখানে কয়েনের পরিমাণ পরিবর্তন করে দেখতে পারেন ---
    let currentCoins = 0; // ধরুন ইউজারের কাছে 0 কয়েন আছে
    const minCoinsToConvert = 3000;
    const conversionRate = 100; // 100 কয়েন = 1 টাকা

    function updateUI() {
        document.getElementById('coinBalance').innerText = currentCoins;
        
        const equivalentCash = (currentCoins / conversionRate).toFixed(2);
        document.getElementById('cashValue').innerText = equivalentCash;
        
        let progressPercentage = (currentCoins / minCoinsToConvert) * 100;
        if(progressPercentage > 100) progressPercentage = 100;
        
        document.getElementById('progressBar').style.width = progressPercentage + '%';
        document.getElementById('currentProgress').innerText = currentCoins + " Coins";

        const btn = document.getElementById('convertBtn');
        if (currentCoins < minCoinsToConvert) {
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-lock"></i> NEED ' + (minCoinsToConvert - currentCoins) + ' MORE COINS';
        } else {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-money-bill-transfer"></i> CONVERT TO CASH';
        }
    }

    function convertCoins() {
        const msgEl = document.getElementById('msg');
        const btn = document.getElementById('convertBtn');
        
        if (currentCoins < minCoinsToConvert) {
            return;
        }

        // লোডিং অ্যানিমেশন
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> PROCESSING...';
        msgEl.innerText = "";

        setTimeout(() => {
            let cashEarned = currentCoins / conversionRate;
            
            // --- ম্যাজিক কোড: Main Balance-এ টাকা সেভ করা ---
            let currentBalance = parseFloat(localStorage.getItem("mainBalance")) || 0;
            let newBalance = currentBalance + cashEarned;
            localStorage.setItem("mainBalance", newBalance.toFixed(2));
            // ---------------------------------------------
            
            currentCoins = 0; 
            updateUI();
            
            msgEl.style.color = "#00ffcc";
            msgEl.innerHTML = `✅ Successfully converted to ₹${cashEarned.toFixed(2)}!<br>Amount has been added to your main balance.`;
        }, 2000);
    }

    // পেজ লোড হওয়ার সাথে সাথে UI আপডেট হবে
    updateUI();
</script>
<script src="language.js"></script>
</body>
</html>
