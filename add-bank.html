<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linked Bank</title>
    <link rel="stylesheet" href="demat-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            margin: 0;
        }
        .bank-container {
            padding: 20px;
        }
        .form-title {
            text-align: center;
            font-size: 16px;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .note-text {
            color: #ffcc00;
            font-size: 12px;
            margin-bottom: 20px;
        }
        .input-group {
            display: flex;
            align-items: center;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            margin-bottom: 15px;
            padding: 12px 15px;
        }
        .input-group i {
            color: #888;
            font-size: 18px;
            margin-right: 15px;
        }
        .input-group input {
            background: transparent;
            border: none;
            color: #fff;
            width: 100%;
            font-size: 14px;
            outline: none;
        }
        .input-group input::placeholder {
            color: #666;
        }
        .otp-group {
            display: flex;
            align-items: center;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 8px;
            margin-bottom: 25px;
            overflow: hidden;
        }
        .otp-group input {
            background: transparent;
            border: none;
            color: #fff;
            padding: 15px;
            width: 60%;
            font-size: 14px;
            outline: none;
        }
        .get-otp-btn {
            background: #00ffcc;
            color: #000;
            border: none;
            width: 40%;
            padding: 15px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 0 8px 8px 0;
        }
        .submit-btn {
            background: #00ffcc;
            color: #000;
            border: none;
            width: 100%;
            padding: 15px;
            font-weight: bold;
            font-size: 16px;
            border-radius: 30px;
            cursor: pointer;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="page-header" style="border-bottom: none; padding-bottom: 0;">
        <a href="index.html" class="back-btn" style="text-decoration: none;">❮</a>
        <h2>Linked Bank</h2>
    </div>

    <div class="bank-container">
        <h3 class="form-title">ADD BANK DETAIL</h3>
        <p class="note-text">Note - Please add your personal bank account only.</p>

        <div class="input-group">
            <i class="fa-regular fa-user"></i>
            <input type="text" id="fullName" placeholder="Enter Full Name">
        </div>

        <div class="input-group">
            <i class="fa-solid fa-building-columns"></i>
            <input type="number" id="accNumber" placeholder="Enter Account Number">
        </div>

        <div class="input-group">
            <i class="fa-solid fa-building-columns"></i>
            <input type="number" id="reAccNumber" placeholder="Re-Enter Account Number">
        </div>

        <div class="input-group">
            <i class="fa-solid fa-building-columns"></i>
            <input type="text" id="bankName" placeholder="Enter Bank Name">
        </div>

        <div class="input-group">
            <i class="fa-solid fa-building-columns"></i>
            <input type="text" id="ifscCode" placeholder="Enter IFSC Code" style="text-transform: uppercase;">
        </div>

        <div class="otp-group">
            <input type="number" id="otpInput" placeholder="Enter OTP">
            <button class="get-otp-btn" id="getOtpBtn" onclick="sendOTP()">GET OTP</button>
        </div>

        <button class="submit-btn" id="submitBtn" onclick="saveBankDetails()">SUBMIT</button>
        <p id="message" style="text-align: center; font-size: 14px; margin-top: 10px;"></p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBOSS89xSmSm3ijgVk5ydyccEh8wSJjn0k",
        authDomain: "earnpe-ca9d8.firebaseapp.com",
        projectId: "earnpe-ca9d8",
        storageBucket: "earnpe-ca9d8.firebasestorage.app",
        messagingSenderId: "305792608968",
        appId: "1:305792608968:web:f91054c2a2b7dac4fc93fd"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Make functions global so inline onclick can use them
    window.sendOTP = function() {
        // রিয়েল OTP এর জন্য SMS API লাগবে। আপাতত আমরা একটি ফেক অ্যালার্ট দেখাচ্ছি।
        alert("OTP sent to your registered mobile number (Demo: 1234)");
    }

    window.saveBankDetails = async function() {
        const name = document.getElementById("fullName").value;
        const accNo = document.getElementById("accNumber").value;
        const reAccNo = document.getElementById("reAccNumber").value;
        const bank = document.getElementById("bankName").value;
        const ifsc = document.getElementById("ifscCode").value.toUpperCase();
        const otp = document.getElementById("otpInput").value;
        const msgElement = document.getElementById("message");

        // ভ্যালিডেশন (চেক করা হচ্ছে সব ঠিক আছে কি না)
        if(!name || !accNo || !reAccNo || !bank || !ifsc || !otp) {
            msgElement.style.color = "red";
            msgElement.innerText = "Please fill all the details!";
            return;
        }

        if(accNo !== reAccNo) {
            msgElement.style.color = "red";
            msgElement.innerText = "Account numbers do not match!";
            return;
        }

        if(otp !== "1234") { // আপাতত ফেক OTP ভ্যালিডেশন
            msgElement.style.color = "red";
            msgElement.innerText = "Invalid OTP!";
            return;
        }

        // ফায়ারবেসে ডেটা সেভ করা
        try {
            document.getElementById("submitBtn").innerText = "SAVING...";
            
            await addDoc(collection(db, "bank_details"), {
                fullName: name,
                accountNumber: accNo,
                bankName: bank,
                ifscCode: ifsc,
                timestamp: new Date()
            });

            msgElement.style.color = "#00ffcc";
            msgElement.innerText = "Bank details added successfully!";
            
            // ফর্ম ক্লিয়ার করা
            document.getElementById("fullName").value = "";
            document.getElementById("accNumber").value = "";
            document.getElementById("reAccNumber").value = "";
            document.getElementById("bankName").value = "";
            document.getElementById("ifscCode").value = "";
            document.getElementById("otpInput").value = "";
            document.getElementById("submitBtn").innerText = "SUBMIT";

            // কিছুক্ষণ পর হোমপেজে পাঠিয়ে দেওয়া
            setTimeout(() => {
                window.location.href = "index.html"; // বা প্রোফাইল পেজ
            }, 2000);

        } catch (error) {
            console.error("Error adding document: ", error);
            msgElement.style.color = "red";
            msgElement.innerText = "Error saving details. Try again.";
            document.getElementById("submitBtn").innerText = "SUBMIT";
        }
    }
</script>
<script src="language.js"></script>
</body>
</html>
